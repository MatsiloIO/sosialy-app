<div class="app-container">
  <!-- Header for small screens -->
  <header class="mobile-header d-md-none p-2 d-flex align-items-center justify-content-between">
    <div class="d-flex align-items-center">
      <button class="btn btn-outline-secondary me-2" (click)="toggleMobileSidebar()">
        <i class="fa-solid fa-bars"></i>
      </button>
      <a class="navbar-brand mb-0" href="#">Team DSSB</a>
    </div>
    <button class="btn btn-outline-secondary btn-sm" (click)="toggleTheme()">
      <i class="fa-solid" [ngClass]="isDarkMode ? 'fa-sun' : 'fa-moon'"></i>
    </button>
  </header>

  <!-- Main layout container -->
  <div class="app-layout">
    <!-- Sidebar for md+ screens -->
    <aside class="app-sidebar d-none d-md-flex flex-column p-3">
      <div class="sidebar-top d-flex justify-content-between align-items-center mb-4">
        <a class="sidebar-brand mb-0" href="#">Team DSSB</a>
        <button class="btn btn-outline-secondary btn-sm" (click)="toggleTheme()">
          <i class="fa-solid" [ngClass]="isDarkMode ? 'fa-sun' : 'fa-moon'"></i>
        </button>
      </div>
      <ul class="nav flex-column gap-1">
        <li class="nav-item">
          <a class="nav-link" routerLink="/members"
            ><i class="fa-solid fa-users me-2"></i> Membres</a
          >
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/cashier"
            ><i class="fa-solid fa-money-bill-wave me-2"></i> Caisse</a
          >
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/contributions"
            ><i class="fa-solid fa-calendar-days me-2"></i> Cotisations</a
          >
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/public/cotisations"
            ><i class="fa-solid fa-eye me-2"></i> Vue publique</a
          >
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/settings"
            ><i class="fa-solid fa-gear me-2"></i> Paramètres</a
          >
        </li>
      </ul>
    </aside>

    <!-- Main content -->
    <main class="app-main p-3">
      <router-outlet></router-outlet>
    </main>
  </div>

  <!-- Mobile sidebar overlay -->
  <div
    *ngIf="showMobileSidebar"
    class="mobile-sidebar-overlay d-md-none"
    (click)="closeMobileSidebar()"
  >
    <nav class="mobile-sidebar" (click)="$event.stopPropagation()">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0">Menu</h5>
        <button class="btn btn-sm btn-outline-secondary" (click)="closeMobileSidebar()">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <ul class="nav flex-column gap-1">
        <li class="nav-item">
          <a class="nav-link" routerLink="/members" (click)="closeMobileSidebar()"
            ><i class="fa-solid fa-users me-2"></i> Membres</a
          >
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/cashier" (click)="closeMobileSidebar()"
            ><i class="fa-solid fa-money-bill-wave me-2"></i> Caisse</a
          >
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/contributions" (click)="closeMobileSidebar()"
            ><i class="fa-solid fa-calendar-days me-2"></i> Cotisations</a
          >
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/public/cotisations" (click)="closeMobileSidebar()"
            ><i class="fa-solid fa-eye me-2"></i> Vue publique</a
          >
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/settings" (click)="closeMobileSidebar()"
            ><i class="fa-solid fa-gear me-2"></i> Paramètres</a
          >
        </li>
      </ul>
      <div class="mt-4">
        <button class="btn btn-outline-secondary w-100" (click)="toggleTheme()">
          <i class="fa-solid" [ngClass]="isDarkMode ? 'fa-sun' : 'fa-moon'"></i>
          Mode {{ isDarkMode ? 'clair' : 'sombre' }}
        </button>
      </div>
    </nav>
  </div>
</div>
