<div class="container mt-4">
  <h2>Gestion des membres</h2>

  <div class="card mb-4">
    <div class="card-body">
      <h5>{{ editingMember ? 'Modifier' : 'Ajouter' }} un membre</h5>
      <div class="row gy-2">
        <div class="col-md-3">
          <input [(ngModel)]="formData.nom" placeholder="Nom" class="form-control" />
        </div>
        <div class="col-md-3">
          <input [(ngModel)]="formData.prenom" placeholder="Prénom" class="form-control" />
        </div>
        <div class="col-md-3">
          <input [(ngModel)]="formData.im" placeholder="IM (matricule)" class="form-control" />
        </div>
        <div class="col-md-3">
          <input [(ngModel)]="formData.service" placeholder="Service" class="form-control" />
        </div>
        <div class="col-md-2">
          <select [(ngModel)]="formData.categorie" class="form-select">
            <option value="A">Catégorie A</option>
            <option value="B">Catégorie B</option>
          </select>
        </div>
      </div>
      <div class="mt-3">
        <button (click)="saveMember()" class="btn btn-primary" [disabled]="isLoading">
          {{ editingMember ? 'Modifier' : 'Ajouter' }}
        </button>
        <button
          *ngIf="editingMember"
          (click)="cancelEdit()"
          class="btn btn-secondary ms-2"
          [disabled]="isLoading"
        >
          Annuler
        </button>
      </div>
    </div>
  </div>

  <app-loading-indicator
    *ngIf="isLoading"
    message="Chargement des membres..."
  ></app-loading-indicator>

  <div class="row mb-3 align-items-end">
    <div class="col-md-4 mb-3 mb-md-0">
      <label class="form-label">Rechercher</label>
      <input
        class="form-control"
        type="text"
        placeholder="Nom, prénom, IM, service..."
        [(ngModel)]="filterText"
        (ngModelChange)="applyFilter()"
      />
    </div>
    <div class="col-md-3 mb-3 mb-md-0">
      <label class="form-label">Catégorie</label>
      <select class="form-select" [(ngModel)]="filterCategory" (ngModelChange)="applyFilter()">
        <option value="all">Toutes</option>
        <option value="A">A</option>
        <option value="B">B</option>
      </select>
    </div>
    <div class="col-md-3 mb-3 mb-md-0">
      <label class="form-label">Lignes / page</label>
      <select class="form-select" [(ngModel)]="pageSize" (ngModelChange)="onPageSizeChange()">
        <option [value]="5">5</option>
        <option [value]="10">10</option>
        <option [value]="20">20</option>
      </select>
    </div>
  </div>

  <div class="table-responsive">
    <table class="table table-striped">
      <thead>
        <tr>
          <th>IM</th>
          <th>Nom</th>
          <th>Prénom</th>
          <th>Service</th>
          <th>Catégorie</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let member of membersPage">
          <td>{{ member.im }}</td>
          <td>{{ member.nom }}</td>
          <td>{{ member.prenom }}</td>
          <td>{{ member.service }}</td>
          <td>{{ member.categorie }}</td>
          <td>
            <button
              (click)="editMember(member)"
              class="btn btn-sm btn-warning me-2"
              [disabled]="isLoading"
            >
              <i class="fa-solid fa-pen"></i>
            </button>
            <button
              (click)="deleteMember(member.id)"
              class="btn btn-sm btn-danger"
              [disabled]="isLoading"
            >
              <i class="fa-solid fa-trash"></i>
            </button>
          </td>
        </tr>
        <tr *ngIf="membersPage.length === 0">
          <td colspan="6" class="text-center text-muted py-4">Aucun membre trouvé</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="d-flex justify-content-between align-items-center mt-3" *ngIf="totalPages > 1">
    <div class="text-muted">Page {{ currentPage }} / {{ totalPages }}</div>
    <nav>
      <ul class="pagination pagination-sm mb-0">
        <li class="page-item" [class.disabled]="currentPage === 1">
          <button class="page-link" type="button" (click)="changePage(currentPage - 1)">
            Précédent
          </button>
        </li>
        <li
          class="page-item"
          *ngFor="let page of getPageArray()"
          [class.active]="currentPage === page"
        >
          <button class="page-link" type="button" (click)="changePage(page)">{{ page }}</button>
        </li>
        <li class="page-item" [class.disabled]="currentPage === totalPages">
          <button class="page-link" type="button" (click)="changePage(currentPage + 1)">
            Suivant
          </button>
        </li>
      </ul>
    </nav>
  </div>
</div>
