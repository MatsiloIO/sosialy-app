<div class="container mt-4">
  <div class="card shadow-sm">
    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
      <div>
        <h4 class="mb-0"><i class="fa-solid fa-gear me-2"></i>Paramètres</h4>
        <small class="text-muted">Configurez les montants des cotisations par catégorie.</small>
      </div>
    </div>
    <div class="card-body">
      <form (ngSubmit)="saveSettings()">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Montant Catégorie A</label>
            <div class="input-group">
              <span class="input-group-text">Ar</span>
              <input
                type="number"
                class="form-control"
                [(ngModel)]="settings.montantA"
                name="montantA"
                min="0"
                step="100"
                required
              />
            </div>
          </div>
          <div class="col-md-6">
            <label class="form-label">Montant Catégorie B</label>
            <div class="input-group">
              <span class="input-group-text">Ar</span>
              <input
                type="number"
                class="form-control"
                [(ngModel)]="settings.montantB"
                name="montantB"
                min="0"
                step="100"
                required
              />
            </div>
          </div>
        </div>

        <div class="mt-4 d-flex gap-2">
          <button type="submit" class="btn btn-primary">
            <i class="fa-solid fa-save me-1"></i> Enregistrer
          </button>
          <button type="button" class="btn btn-outline-secondary" (click)="resetDefaults()">
            <i class="fa-solid fa-rotate-left me-1"></i> Valeurs par défaut
          </button>
        </div>
      </form>
      <div *ngIf="successMessage" class="alert alert-success mt-3">
        {{ successMessage }}
      </div>
    </div>
  </div>
</div>
